kind = "web"
previewPath = "/"
title = "Aardappel Handel Smeets"
version = "1.0.0"
id = "artifacts/smeets-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20071
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/smeets-website run dev"

[services.env]
PORT = "20071"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/smeets-website", "run", "build"]
publicDir = "artifacts/smeets-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
